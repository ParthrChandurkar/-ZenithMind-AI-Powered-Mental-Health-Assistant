<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">ZenithMind AI-Powered Mental Health Assistant Architecture</title>
  <desc id="desc">Architecture diagram for ZenithMind showing the React client, Express API, Socket.IO realtime layer, MongoDB data layer, and integrations with Gemini, Google Fit, and Zoom.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <style>
      .canvas { fill: #ffffff; }
      .group { fill: #ffffff; stroke: #2563eb; stroke-width: 2; stroke-dasharray: 8 7; }
      .group-title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111111; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .box-blue { fill: #ffffff; stroke: #2563eb; stroke-width: 2; }
      .box-green { fill: #ffffff; stroke: #0f9f6e; stroke-width: 2; }
      .box-orange { fill: #ffffff; stroke: #f97316; stroke-width: 2; }
