<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1300" viewBox="0 0 1800 1300" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">ZenithMind AI-Powered Mental Health Assistant Architecture</title>
  <desc id="desc">Layered architecture diagram for ZenithMind showing the React client, Express backend, MongoDB data layer, Socket.IO realtime messaging, and integrations with Gemini, Google Fit, Zoom, and static media.</desc>

  <defs>
    <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#1f2937" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#2563eb" />
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#0f766e" />
    </marker>
    <style>
      .page { fill: #ffffff; }
      .lane { fill: #f8fbff; stroke: #2563eb; stroke-width: 2.4; stroke-dasharray: 9 8; }
      .lane-soft { fill: #f9fafb; stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 9 8; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #111827; }
      .lane-title { font: 700 24px Arial, Helvetica, sans-serif; fill: #111827; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2.2; }
      .box-blue { fill: #ffffff; stroke: #2563eb; stroke-width: 2.2; }
      .box-teal { fill: #ffffff; stroke: #0f766e; stroke-width: 2.2; }
      .box-violet { fill: #ffffff; stroke: #7c3aed; stroke-width: 2.2; }
      .box-amber { fill: #ffffff; stroke: #d97706; stroke-width: 2.2; }
      .box-rose { fill: #ffffff; stroke: #dc2626; stroke-width: 2.2; }
      .box-cyan { fill: #ffffff; stroke: #0891b2; stroke-width: 2.2; }
      .box-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .box-title-small { font: 700 16px Arial, Helvetica, sans-serif; fill: #111827; }
      .body { font: 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .body-small { font: 13px Arial, Helvetica, sans-serif; fill: #111827; }
      .tag { font: 700 13px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #111827; }
      .label-bg { fill: #ffffff; stroke: #e5e7eb; stroke-width: 1; }
      .arrow { stroke: #1f2937; stroke-width: 2.5; fill: none; marker-end: url(#arrow-dark); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow-blue); }
      .arrow-teal { stroke: #0f766e; stroke-width: 2.5; fill: none; marker-end: url(#arrow-teal); }
      .arrow-soft { stroke: #2563eb; stroke-width: 2.3; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow-blue); }
      .bus { stroke: #1f2937; stroke-width: 2.5; fill: none; }
      .bus-teal { stroke: #0f766e; stroke-width: 2.5; fill: none; }
      .muted-line { stroke: #cbd5e1; stroke-width: 1.5; fill: none; }
      .pill-blue { fill: #2563eb; }
      .pill-teal { fill: #0f766e; }
      .pill-violet { fill: #7c3aed; }
      .pill-amber { fill: #d97706; }
      .pill-cyan { fill: #0891b2; }
      .pill-rose { fill: #dc2626; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1800" height="1300" />
  <text x="900" y="56" text-anchor="middle" class="title">ZenithMind System Architecture</text>
  <text x="900" y="84" text-anchor="middle" class="body">AI-powered mental health assistant built with React, Express, MongoDB, realtime community features, and wellness integrations</text>

  <!-- Client lane -->
  <rect class="lane" x="60" y="110" width="1680" height="245" rx="6" />
  <text x="92" y="148" class="lane-title">1. React Client</text>

  <g transform="translate(100,180)">
    <rect class="box" x="0" y="0" width="340" height="125" rx="6" />
    <rect class="pill-blue" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">01</text>
    <text x="86" y="39" class="box-title">Users</text>
    <text x="86" y="67" class="body">Members, therapists,</text>
    <text x="86" y="90" class="body">and admins access</text>
    <text x="86" y="113" class="body">role-specific flows.</text>
  </g>

  <g transform="translate(500,180)">
    <rect class="box-blue" x="0" y="0" width="340" height="125" rx="6" />
    <rect class="pill-blue" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">02</text>
    <text x="86" y="39" class="box-title">React Router App</text>
    <text x="86" y="67" class="body">ProtectedRoute gates</text>
    <text x="86" y="90" class="body">login, signup, and</text>
    <text x="86" y="113" class="body">dashboard screens.</text>
  </g>

  <g transform="translate(900,180)">
    <rect class="box-violet" x="0" y="0" width="340" height="125" rx="6" />
    <rect class="pill-violet" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">03</text>
    <text x="86" y="39" class="box-title">Wellness UI Modules</text>
    <text x="86" y="67" class="body">Mood, sleep, stress,</text>
    <text x="86" y="90" class="body">reports, games, CBT chat,</text>
    <text x="86" y="113" class="body">nutrition, appointments.</text>
  </g>

  <g transform="translate(1300,180)">
    <rect class="box-teal" x="0" y="0" width="340" height="125" rx="6" />
    <rect class="pill-teal" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">04</text>
    <text x="86" y="39" class="box-title">Client State + Calls</text>
    <text x="86" y="67" class="body">localStorage JWT,</text>
    <text x="86" y="90" class="body">AppDataContext, API</text>
    <text x="86" y="113" class="body">helpers, Socket.IO client.</text>
  </g>

  <path class="arrow" d="M 440 242 H 492" />
  <path class="arrow" d="M 840 242 H 892" />
  <path class="arrow" d="M 1240 242 H 1292" />

  <!-- Cross-lane client to backend flows -->
  <path class="arrow" d="M 1470 305 V 382 H 245 V 450" />
  <rect class="label-bg" x="808" y="367" width="142" height="26" rx="4" />
  <text x="879" y="386" text-anchor="middle" class="label">REST + JWT</text>

  <path class="arrow-soft" d="M 1070 305 V 400 H 1595 V 450" />
  <rect class="label-bg" x="1282" y="385" width="104" height="26" rx="4" />
  <text x="1334" y="404" text-anchor="middle" class="label">Socket.IO</text>

  <!-- Backend lane -->
  <rect class="lane" x="60" y="410" width="1680" height="300" rx="6" />
  <text x="92" y="448" class="lane-title">2. Node / Express Backend</text>

  <g transform="translate(100,480)">
    <rect class="box" x="0" y="0" width="290" height="145" rx="6" />
    <rect class="pill-blue" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">05</text>
    <text x="82" y="39" class="box-title-small">Express API Gateway</text>
    <text x="82" y="67" class="body-small">Helmet, CORS, cookies,</text>
    <text x="82" y="88" class="body-small">JSON body parsing,</text>
    <text x="82" y="109" class="body-small">logging, health routes,</text>
    <text x="82" y="130" class="body-small">and error middleware.</text>
  </g>

  <g transform="translate(430,480)">
    <rect class="box-amber" x="0" y="0" width="280" height="145" rx="6" />
    <rect class="pill-amber" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">06</text>
    <text x="82" y="39" class="box-title-small">Auth + Role Layer</text>
    <text x="82" y="67" class="body-small">JWT verification for</text>
    <text x="82" y="88" class="body-small">users, therapists, and</text>
    <text x="82" y="109" class="body-small">admins before protected</text>
    <text x="82" y="130" class="body-small">route handlers run.</text>
  </g>

  <g transform="translate(750,455)">
    <rect class="box-blue" x="0" y="0" width="400" height="195" rx="6" />
    <rect class="pill-blue" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">07</text>
    <text x="86" y="39" class="box-title">Domain REST Routes</text>
    <text x="86" y="70" class="body">Auth, admin, therapist, users</text>
    <text x="86" y="94" class="body">Mood, stress, sleep, activity</text>
    <text x="86" y="118" class="body">Exercises, nutrition, reports</text>
    <text x="86" y="142" class="body">Word Scramble, Quick Math</text>
    <text x="86" y="166" class="body">Appointments, prescriptions</text>
  </g>

  <g transform="translate(1190,455)">
    <rect class="box-violet" x="0" y="0" width="250" height="195" rx="6" />
    <rect class="pill-violet" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">08</text>
    <text x="82" y="39" class="box-title-small">AI + Integrations</text>
    <text x="82" y="70" class="body-small">Gemini proxy routes,</text>
    <text x="82" y="91" class="body-small">structured wellness</text>
    <text x="82" y="112" class="body-small">analysis, Google Fit</text>
    <text x="82" y="133" class="body-small">OAuth/data fetchers,</text>
    <text x="82" y="154" class="body-small">Zoom meeting links.</text>
  </g>

  <g transform="translate(1480,480)">
    <rect class="box-cyan" x="0" y="0" width="250" height="145" rx="6" />
    <rect class="pill-cyan" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">09</text>
    <text x="82" y="39" class="box-title-small">Realtime Community</text>
    <text x="82" y="67" class="body-small">Socket.IO group rooms,</text>
    <text x="82" y="88" class="body-small">message fan-out, online</text>
    <text x="82" y="109" class="body-small">counts, and presence</text>
    <text x="82" y="130" class="body-small">cleanup on disconnect.</text>
  </g>

  <path class="arrow" d="M 390 552 H 422" />
  <path class="arrow" d="M 710 552 H 742" />
  <path class="arrow" d="M 1150 552 H 1182" />
  <path class="arrow-blue" d="M 1150 620 H 1472" />

  <!-- Backend to data flows -->
  <path class="arrow" d="M 950 650 V 735 H 310 V 890" />
  <rect class="label-bg" x="520" y="720" width="150" height="26" rx="4" />
  <text x="595" y="739" text-anchor="middle" class="label">Mongoose models</text>

  <path class="bus-teal" d="M 1315 650 V 765 H 1270" />
  <path class="arrow-teal" d="M 690 765 V 890" />
  <path class="arrow-teal" d="M 980 765 V 890" />
  <path class="arrow-teal" d="M 1270 765 V 890" />
  <path class="bus-teal" d="M 690 765 H 1270" />
  <rect class="label-bg" x="866" y="748" width="228" height="26" rx="4" />
  <text x="980" y="767" text-anchor="middle" class="label">backend-managed integrations</text>

  <path class="arrow-soft" d="M 1595 625 V 800 H 500 V 890" />
  <rect class="label-bg" x="898" y="785" width="176" height="26" rx="4" />
  <text x="986" y="804" text-anchor="middle" class="label">messages + presence</text>

  <!-- Data lane -->
  <rect class="lane" x="60" y="820" width="1680" height="310" rx="6" />
  <text x="92" y="858" class="lane-title">3. Data Layer and External Services</text>

  <g transform="translate(100,890)">
    <rect class="box-teal" x="0" y="0" width="420" height="175" rx="6" />
    <rect class="pill-teal" x="24" y="24" width="42" height="28" rx="14" />
    <text x="45" y="43" text-anchor="middle" class="tag">10</text>
    <text x="86" y="41" class="box-title">MongoDB Atlas / Local MongoDB</text>
    <text x="86" y="73" class="body">Mongoose collections for users,</text>
    <text x="86" y="97" class="body">therapists, appointments, moods,</text>
    <text x="86" y="121" class="body">stress, sleep, activity, journals,</text>
    <text x="86" y="145" class="body">chat sessions, scores, and tokens.</text>
  </g>

  <g transform="translate(560,890)">
    <rect class="box-violet" x="0" y="0" width="260" height="145" rx="6" />
    <rect class="pill-violet" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">11</text>
    <text x="82" y="39" class="box-title-small">Gemini API</text>
    <text x="82" y="70" class="body-small">CBT-style response</text>
    <text x="82" y="91" class="body-small">generation and</text>
    <text x="82" y="112" class="body-small">wellness analysis.</text>
  </g>

  <g transform="translate(850,890)">
    <rect class="box-amber" x="0" y="0" width="260" height="145" rx="6" />
    <rect class="pill-amber" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">12</text>
    <text x="82" y="39" class="box-title-small">Google Fit</text>
    <text x="82" y="70" class="body-small">OAuth 2.0 plus</text>
    <text x="82" y="91" class="body-small">steps, sleep, and</text>
    <text x="82" y="112" class="body-small">fitness activity data.</text>
  </g>

  <g transform="translate(1140,890)">
    <rect class="box-cyan" x="0" y="0" width="260" height="145" rx="6" />
    <rect class="pill-cyan" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">13</text>
    <text x="82" y="39" class="box-title-small">Zoom API</text>
    <text x="82" y="70" class="body-small">Meeting creation</text>
    <text x="82" y="91" class="body-small">for therapist</text>
    <text x="82" y="112" class="body-small">appointments.</text>
  </g>

  <g transform="translate(1430,890)">
    <rect class="box-rose" x="0" y="0" width="260" height="145" rx="6" />
    <rect class="pill-rose" x="24" y="22" width="42" height="28" rx="14" />
    <text x="45" y="41" text-anchor="middle" class="tag">14</text>
    <text x="82" y="39" class="box-title-small">Static Media</text>
    <text x="82" y="70" class="body-small">Images, audio,</text>
    <text x="82" y="91" class="body-small">video, icons, and</text>
    <text x="82" y="112" class="body-small">public assets.</text>
  </g>

  <path class="muted-line" d="M 520 977 H 552" />
  <path class="muted-line" d="M 820 962 H 842" />
  <path class="muted-line" d="M 1110 962 H 1132" />
  <path class="muted-line" d="M 1400 962 H 1422" />

  <!-- Runtime lane -->
  <rect class="lane-soft" x="60" y="1160" width="1680" height="95" rx="6" />
  <text x="92" y="1196" class="lane-title">4. Runtime Configuration and Delivery</text>

  <g transform="translate(455,1212)">
    <rect class="box" x="0" y="0" width="230" height="28" rx="4" />
    <text x="115" y="19" text-anchor="middle" class="body-small">CRA dev server :3000</text>
  </g>
  <g transform="translate(720,1212)">
    <rect class="box" x="0" y="0" width="230" height="28" rx="4" />
    <text x="115" y="19" text-anchor="middle" class="body-small">Express API :7000</text>
  </g>
  <g transform="translate(985,1212)">
    <rect class="box" x="0" y="0" width="250" height="28" rx="4" />
    <text x="125" y="19" text-anchor="middle" class="body-small">Environment variables</text>
  </g>
  <g transform="translate(1270,1212)">
    <rect class="box" x="0" y="0" width="250" height="28" rx="4" />
    <text x="125" y="19" text-anchor="middle" class="body-small">Proxy + API base URL</text>
  </g>

  <path class="arrow" d="M 685 1226 H 712" />
  <path class="arrow" d="M 950 1226 H 977" />
  <path class="arrow" d="M 1235 1226 H 1262" />
</svg>
