      .box-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; }
      .box-title-sm { font: 700 15px Arial, Helvetica, sans-serif; fill: #111111; }
      .box-sub { font: 14px Arial, Helvetica, sans-serif; fill: #111111; }
      .box-sub-sm { font: 12px Arial, Helvetica, sans-serif; fill: #111111; }
      .small { font: 12px Arial, Helvetica, sans-serif; fill: #111111; }
      .label { font: 14px Arial, Helvetica, sans-serif; fill: #111111; }
      .arrow { stroke: #111111; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #2563eb; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow-blue); }
      .line { stroke: #111111; stroke-width: 2; fill: none; }
      .icon { fill: #ffffff; stroke: #111111; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #111111; }
